<!doctype html>
<html lang="tk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Oraza Wagty 2026 - Mary</title>
    <style>
      body {
        font-family:
          system-ui,
          -apple-system,
          'Segoe UI',
          Roboto,
          Arial,
          sans-serif;
        background-color: #0a0f2e;
        color: white;
        margin: 0;
        padding: 0;
        overflow-x: hidden;
      }
      @keyframes activeRowPulse {
        0%,
        100% {
          border-left-color: #1faf5a;
        }
        50% {
          border-left-color: #4ade80;
        }
      }
      @keyframes iftarBlink {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.3;
        }
      }
      @keyframes shimmer {
        0% {
          background-position: -200% center;
        }
        100% {
          background-position: 200% center;
        }
      }
      /* Плавное покачивание канистр */

      .shimmer {
        background: linear-gradient(90deg, #d4a843 0%, #fff7e6 50%, #d4a843 100%);
        background-size: 200% auto;
        animation: shimmer 3s linear infinite;
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      .custom-scrollbar::-webkit-scrollbar {
        width: 4px;
        height: 4px;
      }
      .custom-scrollbar::-webkit-scrollbar-track {
        background: rgba(255, 255, 255, 0.05);
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background: #d4a843;
        border-radius: 10px;
      }
    </style>
    <link rel="stylesheet" href="/index.css" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
